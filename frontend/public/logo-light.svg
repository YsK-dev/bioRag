<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 40" width="160" height="40">
  <!-- Left DNA strand -->
  <line x1="10" y1="8" x2="10" y2="32" stroke="#2d6ca7" stroke-width="2" stroke-linecap="round"/>
  <!-- Right DNA strand -->
  <line x1="26" y1="8" x2="26" y2="32" stroke="#f7b84b" stroke-width="2" stroke-linecap="round"/>
  <!-- Base pairs -->
  <line x1="10" y1="12" x2="26" y2="12" stroke="#2d6ca7" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="10" y1="20" x2="26" y2="20" stroke="#2d6ca7" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="10" y1="28" x2="26" y2="28" stroke="#2d6ca7" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <!-- Nodes left -->
  <circle cx="10" cy="12" r="3.5" fill="#2d6ca7"/>
  <circle cx="10" cy="20" r="3.5" fill="#2d6ca7"/>
  <circle cx="10" cy="28" r="3.5" fill="#2d6ca7"/>
  <!-- Nodes right -->
  <circle cx="26" cy="12" r="3.5" fill="#f7b84b"/>
  <circle cx="26" cy="20" r="3.5" fill="#f7b84b"/>
  <circle cx="26" cy="28" r="3.5" fill="#f7b84b"/>
  <!-- App name -->
  <text x="40" y="27" font-family="Poppins, Roboto, sans-serif" font-weight="700" font-size="20" fill="#2d6ca7">BioRAG</text>
</svg>
